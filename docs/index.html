<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="apple-touch-icon" href="pwa-512x512.png" />
    <title>Tetris Max</title>
    <meta name="theme-color" content="#000000" />
    <!-- iOS Safari: prevent pinch-zoom (viewport meta is ignored since iOS 10) -->
    <script>
      (function () {
        function preventZoom(e) {
          e.preventDefault();
        }
        document.addEventListener('gesturestart', preventZoom, {
          passive: false,
        });
        document.addEventListener('gesturechange', preventZoom, {
          passive: false,
        });
        document.addEventListener('gestureend', preventZoom, {
          passive: false,
        });
      })();
    </script>
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <script type="module" crossorigin src="/tetris-max-web-port/assets/index-Cd44yfwM.js"></script>
    <link rel="stylesheet" crossorigin href="/tetris-max-web-port/assets/index-DAR8Wn-Q.css">
  <link rel="manifest" href="/tetris-max-web-port/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/tetris-max-web-port/registerSW.js"></script></head>
  <body>
    <div class="main-container">
      <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
      </div>
    </div>

    <div class="mobile-controls" id="mobileControls">
      <div class="mobile-controls-inner">
        <button
          id="mobileLeft"
          class="mobile-btn"
          aria-label="Move left"
        ></button>
        <button
          id="mobileRight"
          class="mobile-btn"
          aria-label="Move right"
        ></button>
        <button
          id="mobileSoftDrop"
          class="mobile-btn"
          aria-label="Slow drop"
        ></button>
        <button
          id="mobileHardDrop"
          class="mobile-btn"
          aria-label="Fast drop"
        ></button>
        <button
          id="mobileRotateCcw"
          class="mobile-btn"
          aria-label="Rotate counterclockwise"
        ></button>
        <button
          id="mobileRotateCw"
          class="mobile-btn"
          aria-label="Rotate clockwise"
        ></button>
        <button
          type="button"
          id="mobileStartPause"
          class="mobile-btn mobile-btn-text"
        >
          Start
        </button>
        <button
          type="button"
          id="mobileToggleBar"
          class="mobile-btn mobile-btn-text"
        >
          Menu
        </button>
      </div>
      <div id="deadArea"></div>
    </div>

    <div class="side-panel-wrapper" id="sidePanelWrapper">
      <div class="side-panel">
        <div class="controls-row">
          <button id="startBtn" class="game-btn primary">Begin Game</button>
          <button id="pauseBtn" class="game-btn" disabled>Pause</button>
          <button id="highScoresBtn" class="game-btn">High Scores</button>
          <button id="aboutBtn" class="game-btn">About...</button>
        </div>
        <div class="controls-row">
          <button id="soundBtn" class="game-btn">Sound Effects: ON</button>
          <button id="musicBtn" class="game-btn">Music: ON</button>
          <div class="settings-section">
            <label for="displaySelect">Display:</label>
            <div class="select-wrap">
              <select id="displaySelect">
                <option value="window">Color</option>
                <option value="fullscreen">Color Large</option>
                <option value="bw">Monochrome</option>
                <option value="mobile">Mobile</option>
              </select>
            </div>
          </div>
          <div class="settings-section">
            <label for="levelSelect">Starting Level:</label>
            <div class="select-wrap">
              <select id="levelSelect">
                <option value="1">Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
                <option value="4">Level 4</option>
                <option value="5">Level 5</option>
                <option value="6">Level 6</option>
                <option value="7">Level 7</option>
                <option value="8">Level 8</option>
                <option value="9">Level 9</option>
                <option value="10">Level 10</option>
              </select>
            </div>
          </div>
          <div class="settings-section">
            <label for="musicSelect">Music:</label>
            <div class="select-wrap">
              <select id="musicSelect">
                <option value="peter_wagner">Peter Wagner</option>
                <option value="animal_instinct">Animal Instinct</option>
              </select>
            </div>
          </div>
          <div class="settings-section">
            <label for="piecesSelect">Pieces:</label>
            <div class="select-wrap">
              <select id="piecesSelect">
                <option value="default">Default</option>
                <option value="diamond">Diamond</option>
                <option value="spherical">Spherical</option>
              </select>
            </div>
          </div>
          <div class="settings-section">
            <label for="backgroundSelect">Backgrounds:</label>
            <div class="select-wrap">
              <select id="backgroundSelect">
                <option value="default">Default</option>
                <option value="pot_luck">Pot Luck</option>
              </select>
            </div>
          </div>
        </div>
        <div class="controls-row">
          <div class="controls-help">
            <span>Controls:</span>
            <table>
              <tr>
                <td><kbd>←</kbd> / <kbd>J</kbd></td>
                <td>Move Left</td>
              </tr>
              <tr>
                <td><kbd>→</kbd> / <kbd>L</kbd></td>
                <td>Move Right</td>
              </tr>
              <tr>
                <td><kbd>↓</kbd> / <kbd>Space</kbd></td>
                <td>Hard Drop</td>
              </tr>
              <tr>
                <td><kbd>↑</kbd> / <kbd>I</kbd></td>
                <td>Rotate CW</td>
              </tr>
              <tr>
                <td><kbd>K</kbd></td>
                <td>Rotate CCW</td>
              </tr>
              <tr>
                <td><kbd>M</kbd></td>
                <td>Soft Drop</td>
              </tr>
              <tr>
                <td><kbd>P</kbd></td>
                <td>Pause</td>
              </tr>
            </table>
          </div>
        </div>
        <div class="footer">
          <a href="https://github.com/Yqnn/tetris-max-web-port" target="_blank">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
              />
            </svg>
            GitHub
          </a>
          <a href="https://github.com/sponsors/Yqnn" target="_blank">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 16 13.92"
              class="sponsor"
            >
              <path
                d="M8 13.24C4.45 11.3.75 8 .75 4.5.75 2.2 2.55.75 4.25.75 6 .75 7.5 2 8 3.75c.5-1.75 2-3 3.75-3 1.7 0 3.5 1.45 3.5 3.75 0 3.5-3.7 6.8-7.25 8.74z"
                fill="none"
                stroke="#bf3989"
                stroke-linejoin="round"
                stroke-width="1.5"
              />
            </svg>
            Sponsor
          </a>
        </div>
      </div>
    </div>

    <div id="highScoreModalOverlay" class="highscore-modal-overlay" hidden>
      <div id="highScoreModal" class="highscore-modal popup-window">
        <div class="highscore-modal-content">
          <div class="highscore-modal-tetromino"></div>
          <div class="highscore-modal-text">
            <p>
              Congratulations! You've set a new high score! Enter your name:
            </p>
            <input
              type="text"
              id="highScoreNameInput"
              class="highscore-modal-input"
              maxlength="20"
              value="Player"
              placeholder="Player"
              data-1p-ignore
            />
            <button
              type="button"
              id="highScoreModalOk"
              class="game-btn primary"
            >
              OK
            </button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
